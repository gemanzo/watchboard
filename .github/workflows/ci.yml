name: CI

on:
  pull_request:
    branches: [develop, master]
  push:
    branches: [develop, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ['8.4']

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: watchboard_test
          POSTGRES_USER: watchboard
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: watchboard_test
      DB_USERNAME: watchboard
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── PHP ──────────────────────────────────────────────────────────────────
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_pgsql, mbstring, exif, pcntl, bcmath, redis
          coverage: none
          ini-values: error_reporting=E_ALL

      # ── Composer ─────────────────────────────────────────────────────────────
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # ── Node / Assets ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      # ── Laravel bootstrap ────────────────────────────────────────────────────
      - name: Copy .env
        run: cp .env.example .env

      - name: Patch .env for CI
        run: |
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=watchboard_test/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=watchboard/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=secret/' .env

      - name: Generate application key
        run: php artisan key:generate --force

      - name: Run database migrations
        run: php artisan migrate --force

      # ── Tests ────────────────────────────────────────────────────────────────
      - name: Run test suite
        run: php artisan test --no-coverage
