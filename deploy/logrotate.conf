# /etc/logrotate.d/watchboard
#
# Rotates Laravel application logs daily, keeps 30 days compressed.

/var/www/watchboard/storage/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    copytruncate
    create 0664 www-data www-data
    su www-data www-data
}
